name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Run tests
      run: |
        pytest --cov=backend --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  security-scans:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install bandit safety pip-audit
    
    - name: Run Bandit Security Scan
      id: bandit
      continue-on-error: true
      run: |
        bandit -r backend/ -f json -o bandit-results.json || echo "Bandit scan completed"
        bandit -r backend/ -ll
    
    - name: Run pip-audit
      id: pip-audit
      continue-on-error: true
      run: |
        pip-audit -r requirements.txt -r requirements-dev.txt --desc > pip-audit-results.txt || echo "pip-audit completed"
        cat pip-audit-results.txt
    
    - name: Run Safety Check
      id: safety
      continue-on-error: true
      run: |
        safety check -r requirements.txt -r requirements-dev.txt --full-report > safety-results.json || echo "Safety check completed"
        safety check -r requirements.txt -r requirements-dev.txt --short-report
    
    - name: Upload Security Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports-${{ matrix.python-version }}
        path: |
          bandit-results.json
          pip-audit-results.txt
          safety-results.json
